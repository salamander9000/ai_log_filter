version: "3.8"

services:
  # --- OpenSearch for storing analyzed logs ---
  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=X9k#mP2vL!qR7wZy
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - plugins.security.disabled=true          # PoC only - no TLS hassle
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - lognet
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 20

  # --- OpenSearch Dashboards for visualization ---
  dashboards:
    image: opensearchproject/opensearch-dashboards:2.18.0
    container_name: opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true   # match disabled security above
    ports:
      - "5601:5601"
    networks:
      - lognet
    depends_on:
      opensearch:
        condition: service_healthy

  # --- Redis buffer (input queue + Layer 3 queue) ---
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --maxmemory 4gb --maxmemory-policy noeviction --appendonly no --save ""
    ports:
      - "6379:6379"
    networks:
      - lognet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- HAProxy: load balancer for Ollama server pool ---
  # Optional: only needed when using multiple Ollama servers.
  # For single-server, set OLLAMA_HOST directly in .env and skip HAProxy.
  haproxy:
    image: haproxy:2.9-alpine
    container_name: haproxy
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "8405:8405"      # HAProxy stats page
    networks:
      - lognet
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - multi-ollama    # only starts with: docker compose --profile multi-ollama up

  # --- Syslog TCP/UDP receiver (accepts remote syslog, pushes to Redis) ---
  syslog-receiver:
    build:
      context: ./syslog-receiver
      dockerfile: Dockerfile
      args:
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    container_name: syslog-receiver
    environment:
      - LISTEN_HOST=0.0.0.0
      - LISTEN_PORT=5514
      - REDIS_HOST=redis://redis:6379
      - REDIS_KEY=filebeat:logs
    ports:
      - "5514:5514/tcp"
      - "5514:5514/udp"
    networks:
      - lognet
    depends_on:
      redis:
        condition: service_healthy

  # --- Synthetic syslog generator (demo mode only) ---
  log-generator:
    build:
      context: ./sample-logs
      dockerfile: Dockerfile
      args:
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    container_name: log-generator
    volumes:
      - shared-logs:/var/log/synthetic
    networks:
      - lognet
    profiles:
      - demo    # only starts with: docker compose --profile demo up

  # --- The AI log analysis service (Layer 1 + Layer 2) ---
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
      args:
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    container_name: ai-log-service
    environment:
      - OPENSEARCH_HOST=http://opensearch:9200
      # OLLAMA_HOST: point to your Ollama instance(s)
      #   Single server:  http://host.docker.internal:11434  (Ollama on the host)
      #   Multi-server:   http://haproxy:11434               (via HAProxy load balancer)
      #   Remote server:  http://10.0.1.10:11434             (direct to a specific server)
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - REDIS_HOST=redis://redis:6379
      - REDIS_KEY=filebeat:logs
      - INPUT_MODE=${INPUT_MODE:-redis}
      - LOG_FILE=/var/log/synthetic/syslog
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:3b}
      - LLM_ENABLED=true
      # LLM_WORKERS: set to number of Ollama servers + 2 for optimal throughput
      - LLM_WORKERS=${LLM_WORKERS:-2}
      - LLM_QUEUE_SIZE=10000
      - "ANOMALY_THRESHOLD=-0.4"
      - TRAINING_WINDOW=5000
      - CONTAMINATION=0.01
      - BATCH_SIZE=50
      # Layer 3 integration: push high-severity anomalies to Layer 3 queue
      - L3_ENABLED=${L3_ENABLED:-true}
      - L3_QUEUE_KEY=layer3:queue
      - L3_SEVERITY_FILTER=high,critical
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - shared-logs:/var/log/synthetic:ro
    networks:
      - lognet
    depends_on:
      opensearch:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Layer 3: Correlation Engine ---
  # Consumes high-severity anomalies, queries production ES for context,
  # sends enriched data to LLM for final threat assessment.
  layer3-engine:
    build:
      context: ./layer3-engine
      dockerfile: Dockerfile
      args:
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    container_name: layer3-engine
    environment:
      - REDIS_HOST=redis://redis:6379
      - L3_QUEUE_KEY=layer3:queue
      - OPENSEARCH_HOST=http://opensearch:9200
      # L3 can use same Ollama as L2, or a different/larger model on different servers
      - OLLAMA_HOST=${L3_OLLAMA_HOST:-${OLLAMA_HOST:-http://host.docker.internal:11434}}
      # Layer 3 LLM model (can be different/larger than Layer 2)
      - L3_LLM_MODEL=${L3_LLM_MODEL:-qwen2.5:3b}
      # Production Elasticsearch for contextual queries
      - PROD_ES_HOST=${PROD_ES_HOST:-}
      - PROD_ES_USER=${PROD_ES_USER:-}
      - PROD_ES_PASS=${PROD_ES_PASS:-}
      - PROD_ES_INDEX=${PROD_ES_INDEX:-logs-*}
      - PROD_ES_VERIFY_CERTS=${PROD_ES_VERIFY_CERTS:-false}
      # Correlation settings
      - CORRELATION_WINDOW_SEC=${CORRELATION_WINDOW_SEC:-300}
      - MAX_CORRELATED_EVENTS=100
      - L3_SEVERITY_FILTER=high,critical
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - lognet
    depends_on:
      opensearch:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  opensearch-data:
  shared-logs:

networks:
  lognet:
    driver: bridge
