# ==========================================================================
# HAProxy configuration for Ollama load balancing
# ==========================================================================
#
# Distributes LLM inference requests across multiple Ollama servers using
# leastconn balancing (sends to the server with fewest active connections).
#
# To add/remove Ollama servers, edit the "backend ollama_servers" section
# and reload HAProxy:  docker compose exec haproxy haproxy -f /usr/local/etc/haproxy/haproxy.cfg -sf $(pgrep haproxy)
#
# Stats page: http://localhost:8405/stats
# ==========================================================================

global
    log stdout format raw local0 info
    maxconn 256

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    # Long timeouts for LLM inference (can take 30+ seconds on CPU)
    timeout connect 10s
    timeout client  300s
    timeout server  300s
    timeout http-request 300s
    retries 2
    option  redispatch

# ---------------------------------------------------------------------------
# Frontend: accepts connections from the AI service
# ---------------------------------------------------------------------------
frontend ollama_front
    bind *:11434
    default_backend ollama_servers

# ---------------------------------------------------------------------------
# Backend: pool of Ollama servers
# ---------------------------------------------------------------------------
# leastconn: routes to the server with the fewest active connections.
# This is ideal for LLM inference because request times vary widely
# (2-30 seconds). Round-robin would overload slow servers.
#
# Health check: GET /api/tags returns 200 when Ollama is ready.
# Interval 10s, mark down after 3 failures, mark up after 2 successes.
#
# IMPORTANT: Replace the example server addresses below with your actual
# Ollama server IPs. Each server should have Ollama installed and running
# with the model pre-pulled (see scripts/setup-ollama-node.sh).
# ---------------------------------------------------------------------------
backend ollama_servers
    balance leastconn
    option httpchk GET /api/tags
    http-check expect status 200

    # --- Ollama server pool ---
    # Local Ollama (in Docker stack, always available for single-server mode)
    server ollama-local ollama:11434 check inter 10s fall 3 rise 2

    # Remote bare metal servers (uncomment and set IPs when ready)
    # server ollama-srv1 10.0.1.10:11434 check inter 10s fall 3 rise 2
    # server ollama-srv2 10.0.1.11:11434 check inter 10s fall 3 rise 2
    # server ollama-srv3 10.0.1.12:11434 check inter 10s fall 3 rise 2
    # server ollama-srv4 10.0.1.13:11434 check inter 10s fall 3 rise 2

# ---------------------------------------------------------------------------
# Stats page: http://localhost:8405/stats
# ---------------------------------------------------------------------------
frontend stats
    bind *:8405
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends
    stats show-node
