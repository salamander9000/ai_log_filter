# ==========================================================================
# HAProxy configuration for Ollama load balancing
# ==========================================================================
#
# Two separate backend pools:
#   Port 11434 -> Layer 2 servers (small/fast model, e.g. qwen2.5:0.5b)
#   Port 11435 -> Layer 3 servers (larger model, e.g. qwen2.5:3b)
#
# Stats page: http://localhost:8405/stats
#
# To reload after editing:
#   docker compose exec haproxy kill -s HUP 1
# ==========================================================================

global
    log stdout format raw local0 info
    maxconn 256

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    # Long timeouts for LLM inference (can take 30+ seconds on CPU)
    timeout connect 10s
    timeout client  300s
    timeout server  300s
    timeout http-request 300s
    retries 2
    option  redispatch

# ---------------------------------------------------------------------------
# Layer 2 Frontend (port 11434) - fast model, high throughput
# ---------------------------------------------------------------------------
frontend ollama_l2
    bind *:11434
    default_backend ollama_l2_servers

# ---------------------------------------------------------------------------
# Layer 3 Frontend (port 11435) - larger model, deeper analysis
# ---------------------------------------------------------------------------
frontend ollama_l3
    bind *:11435
    default_backend ollama_l3_servers

# ---------------------------------------------------------------------------
# Layer 2 Backend: fast model servers
# ---------------------------------------------------------------------------
# Replace <L2_SERVER_1>, etc. with your actual hostnames/IPs.
# ---------------------------------------------------------------------------
backend ollama_l2_servers
    balance leastconn
    option httpchk GET /api/tags
    http-check expect status 200

    server l2-srv1 <L2_SERVER_1>:11434 check inter 10s fall 3 rise 2    # 64t, parallel=4
    server l2-srv2 <L2_SERVER_2>:11434 check inter 10s fall 3 rise 2    # 64t, parallel=4
    server l2-srv3 <L2_SERVER_3>:11434 check inter 10s fall 3 rise 2    # 32t, parallel=2

# ---------------------------------------------------------------------------
# Layer 3 Backend: larger model servers
# ---------------------------------------------------------------------------
# Replace <L3_SERVER_1>, etc. with your actual hostnames/IPs.
# ---------------------------------------------------------------------------
backend ollama_l3_servers
    balance leastconn
    option httpchk GET /api/tags
    http-check expect status 200

    server l3-srv1 <L3_SERVER_1>:11434 check inter 10s fall 3 rise 2    # 48t, parallel=3
    server l3-srv2 <L3_SERVER_2>:11434 check inter 10s fall 3 rise 2    # 48t, parallel=3

# ---------------------------------------------------------------------------
# Stats page: http://localhost:8405/stats
# Shows both L2 and L3 pools with per-server metrics.
# ---------------------------------------------------------------------------
frontend stats
    bind *:8405
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends
    stats show-node
